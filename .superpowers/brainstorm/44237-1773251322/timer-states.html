<h2>Timer — Final Design</h2>
<p class="subtitle">Pill toggle above the Start button, disabled while running</p>

<div class="split">

  <div class="mockup">
    <div class="mockup-header">State 1 — Idle (pill enabled)</div>
    <div class="mockup-body" style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px;">

      <div style="font-size:13px;font-weight:600;color:#555;">Timer</div>

      <!-- progress ring -->
      <div style="position:relative;width:100px;height:100px;">
        <svg width="100" height="100">
          <circle stroke="#e0e0e0" stroke-width="8" fill="transparent" r="42" cx="50" cy="50"/>
          <circle stroke="#5b6af8" stroke-width="8" fill="transparent" r="42" cx="50" cy="50"
            stroke-dasharray="263.9" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 50 50)"/>
        </svg>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:700;color:#333;">1:30</div>
      </div>

      <!-- pill toggle (enabled) -->
      <div style="display:flex;gap:4px;background:#e8eaf0;border-radius:999px;padding:3px;">
        <div style="background:#5b6af8;color:white;border-radius:999px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;">90s</div>
        <div style="color:#555;border-radius:999px;padding:5px 14px;font-size:12px;cursor:pointer;">3 min</div>
        <div style="color:#555;border-radius:999px;padding:5px 14px;font-size:12px;cursor:pointer;">5 min</div>
      </div>

      <!-- controls -->
      <div style="display:flex;gap:8px;">
        <div style="background:#5b6af8;color:white;border-radius:8px;padding:8px 18px;font-size:12px;font-weight:600;">▶️ Start</div>
        <div style="background:#eee;color:#555;border-radius:8px;padding:8px 14px;font-size:12px;">🔄 Reset</div>
      </div>

    </div>
  </div>

  <div class="mockup">
    <div class="mockup-header">State 2 — Running (pill disabled)</div>
    <div class="mockup-body" style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px;">

      <div style="font-size:13px;font-weight:600;color:#555;">Timer</div>

      <!-- progress ring (partial) -->
      <div style="position:relative;width:100px;height:100px;">
        <svg width="100" height="100">
          <circle stroke="#e0e0e0" stroke-width="8" fill="transparent" r="42" cx="50" cy="50"/>
          <circle stroke="#5b6af8" stroke-width="8" fill="transparent" r="42" cx="50" cy="50"
            stroke-dasharray="263.9" stroke-dashoffset="105" stroke-linecap="round" transform="rotate(-90 50 50)"/>
        </svg>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:700;color:#333;">1:02</div>
      </div>

      <!-- pill toggle (disabled) -->
      <div style="display:flex;gap:4px;background:#f0f0f0;border-radius:999px;padding:3px;opacity:0.45;cursor:not-allowed;">
        <div style="background:#aaa;color:white;border-radius:999px;padding:5px 14px;font-size:12px;font-weight:600;">90s</div>
        <div style="color:#aaa;border-radius:999px;padding:5px 14px;font-size:12px;">3 min</div>
        <div style="color:#aaa;border-radius:999px;padding:5px 14px;font-size:12px;">5 min</div>
      </div>

      <!-- controls -->
      <div style="display:flex;gap:8px;">
        <div style="background:#eee;color:#555;border-radius:8px;padding:8px 18px;font-size:12px;font-weight:600;">⏸️ Pause</div>
        <div style="background:#eee;color:#555;border-radius:8px;padding:8px 14px;font-size:12px;">🔄 Reset</div>
      </div>

    </div>
  </div>

</div>

<p class="subtitle" style="margin-top:16px;">Does this look right? Let me know in the terminal.</p>
